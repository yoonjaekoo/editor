    Graph(int v) : vertices(v), adjList(v) {}

    void addEdge(int u, int v) {
        adjList[u].push_back(v);
        adjList[v].push_back(u);
    }

    // Breadth-First Search
    vector<int> bfs(int start) {
        vector<bool> visited(vertices, false);
        vector<int> result;
        queue<int> q;

        visited[start] = true;
        q.push(start);

        while (!q.empty()) {
            int node = q.front();
            q.pop();
            result.push_back(node);

            for (int neighbor : adjList[node]) {
                if (!visited[neighbor]) {
                    visited[neighbor] = true;
                    q.push(neighbor);
                }
            }
        }
        return result;
    }

    // DFS Helper function
    void dfsHelper(int node, vector<bool>& visited,
                   vector<int>& result) {
        visited[node] = true;
        result.push_back(node);

        for (int next : adjList[node]) {
            if (!visited[next]) {
                dfsHelper(next, visited, result);
            }
        }
    }

    // Depth-First Search
    vector<int> dfs(int start) {
        vector<bool> visited(vertices, false);
        vector<int> result;
        dfsHelper(start, visited, result);
        return result;
    }

    // Get shortest path using BFS
    vector<int> shortestPath(int src, int dest) {
        vector<int> parent(vertices, -1);
        vector<bool> visited(vertices, false);
        queue<int> q;

        visited[src] = true;
        q.push(src);

        while (!q.empty()) {
            int curr = q.front();
            q.pop();

            if (curr == dest) break;

            for (int nbr : adjList[curr]) {
                if (!visited[nbr]) {
                    visited[nbr] = true;
                    parent[nbr] = curr;
                    q.push(nbr);
                }
            }
        }

        // Reconstruct path
        vector<int> path;
        int node = dest;
        while (node != -1) {
            path.push_back(node);
            node = parent[node];
        }
        reverse(path.begin(), path.end());
        return path;
    }
};

// Template function to find maximum
template<typename T>
T findMax(const vector<T>& arr) {
    T maxVal = arr[0];
    for (const auto& item : arr) {
        if (item > maxVal) {
            maxVal = item;
        }
    }
    return maxVal;
}

// Fibonacci with O(n) time complexity
int fibonacci(int n) {
    if (n <= 1) return n;

    int prev2 = 0, prev1 = 1;
    for (int i = 2; i <= n; i++) {
        int current = prev1 + prev2;
        prev2 = prev1;
        prev1 = current;
    }
    return prev1;
}

// Calculate factorial recursively
long long factorial(int n) {
    if (n <= 1) return 1;
    return n * factorial(n - 1);
}

    // Create a graph with 7 vertices
    Graph g(7);
    g.addEdge(0, 1);
    g.addEdge(0, 2);
    g.addEdge(1, 3);
    g.addEdge(1, 4);
    g.addEdge(2, 5);
    g.addEdge(2, 6);
    g.addEdge(3, 5);

    // Test BFS traversal
    cout << "BFS from node 0: ";
    for (int v : g.bfs(0)) {
        cout << v << " ";
    }
    cout << endl;

    // Test DFS traversal
    cout << "DFS from node 0: ";
    for (int v : g.dfs(0)) {
        cout << v << " ";
    }
    cout << endl;

    // Find shortest path
    cout << "Shortest path 0->5: ";
    for (int v : g.shortestPath(0, 5)) {
        cout << v << " ";
    }
    cout << endl;

    // Test fibonacci
    cout << "\\nFibonacci sequence: ";
    for (int i = 0; i < 12; i++) {
        cout << fibonacci(i) << " ";
    }
    cout << endl;

    // Test max finder with template
    vector<int> numbers = {3, 7, 2, 9, 1, 5, 8, 4, 6, 0};
    cout << "Maximum value: " << findMax(numbers) << endl;

    // Test factorial
    for (int i = 1; i <= 10; i++) {
        cout << i << "! = " << factorial(i) << endl;
    }

    string message = "Hello, C++ World!";
    cout << "\\n" << message << endl;

    return 0;
