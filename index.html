<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova C++ Studio</title>
  <style>
    :root{--bg:#111319;--panel:#1a1d25;--panel2:#161922;--line:#252a36;--text:#dce3f2;--muted:#7f8aa3;--accent:#5ea7ff;--ok:#59d090;--warn:#f2c96c;--error:#ec6d7a}
    *{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden}
    .app{display:grid;height:100%;grid-template-rows:34px 1fr 24px}
    .top{display:flex;align-items:center;gap:10px;background:linear-gradient(#202431,#1a1d25);border-bottom:1px solid var(--line);padding:0 12px}
    .dot{width:10px;height:10px;border-radius:50%;background:#2f3545;transition:.2s}.dot:hover{background:#4b5572}
    .title{margin-left:8px;color:#b3bdd5}
    .main{display:grid;grid-template-columns:46px 240px 1fr;background:var(--panel2);min-height:0}
    .activity{border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding-top:10px;gap:8px}
    .icon{width:28px;height:28px;border-radius:8px;background:#222838;cursor:pointer;transition:.2s}.icon:hover,.icon.active{background:#2d3750}
    .explorer{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;transition:.25s ease}
    .explorer.hidden{width:0;overflow:hidden;border-right:0}
    .ex-head{padding:10px 12px;color:#9ba7c7;font:600 11px/1.1 system-ui}
    .tree{padding:0 8px}.file{padding:6px 8px;border-radius:6px;color:#9aa4c0;display:flex;gap:8px;align-items:center}.file.active{background:#2a3143;color:#dce3f2}
    .editor-wrap{position:relative;min-width:0;display:grid;grid-template-rows:35px 1fr}
    .tabs{display:flex;align-items:end;background:#181c26;border-bottom:1px solid var(--line)}
    .tab{padding:9px 16px;background:#1f2431;border-right:1px solid var(--line);color:#9ba7c7}
    .work{position:relative;overflow:hidden}
    .searchbar{position:absolute;right:16px;top:12px;z-index:8;display:none;gap:6px;background:#1f2431;border:1px solid #36405a;border-radius:8px;padding:6px}
    .searchbar.show{display:flex}
    .searchbar input{background:#121722;border:1px solid #303a52;color:var(--text);padding:6px 8px;border-radius:6px;width:130px}
    .searchbar button{background:#2a3350;border:0;color:#d9e6ff;padding:6px 8px;border-radius:6px;cursor:pointer}
    .code-area{position:absolute;inset:0;overflow:auto;scroll-behavior:smooth;background:#141822}
    .code{display:grid;grid-template-columns:56px 1fr;min-height:100%;padding:8px 0}
    .ln{user-select:none;color:#5f6b89;text-align:right;padding:0 12px 0 0;white-space:pre}
    .txt{white-space:pre;outline:none;color:transparent;caret-color:var(--text);padding-right:24px}
    .txt, .hl{font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .hl{position:absolute;inset:8px 0 8px 56px;pointer-events:none;padding-right:24px;white-space:pre;color:var(--text)}
    .k{color:#74b7ff}.t{color:#59d090}.n{color:#f7ce7e}.s{color:#e89ce3}.c{color:#6e7a96}
    .cursor-fx{position:absolute;width:14px;height:14px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,#7db4ff99 0,#7db4ff22 55%,transparent 75%);filter:blur(1px);transform:translate(-50%,-50%);opacity:0;transition:transform .22s cubic-bezier(.22,1,.36,1),opacity .35s}
    .status{display:flex;justify-content:space-between;align-items:center;background:#1c2230;border-top:1px solid var(--line);padding:0 10px;color:#9ba7c7;font:12px/1 system-ui}
    @media (max-width:900px){.main{grid-template-columns:46px 0 1fr}.explorer{display:none}}
  </style>
</head>
<body>
<div class="app">
  <div class="top"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="title">Nova C++ Studio</div></div>
  <div class="main">
    <div class="activity"><div class="icon active" id="toggleExplorer"></div><div class="icon" id="midClickMode" title="Middle click: multi-cursor anchor"></div></div>
    <aside class="explorer" id="explorer"><div class="ex-head">EXPLORER</div><div class="tree"><div class="file active">📄 untitled.cpp</div></div></aside>
    <section class="editor-wrap">
      <div class="tabs"><div class="tab">untitled.cpp</div></div>
      <div class="work" id="work">
        <div class="searchbar" id="searchbar"><input id="findInput"><input id="replaceInput"><button id="nextBtn">Next</button><button id="replaceBtn">Replace</button></div>
        <div class="code-area" id="scroll"><div class="hl" id="highlight"></div><div class="code"><div class="ln" id="lineNums">1</div><div class="txt" id="editor" contenteditable="true" spellcheck="false" aria-label="C++ Editor"></div></div></div>
        <div class="cursor-fx" id="fx"></div>
      </div>
    </section>
  </div>
  <div class="status"><span id="left">C++ | UTF-8 | LF</span><span id="right">Ln 1, Col 1</span></div>
</div>
<script>
const editor=document.getElementById('editor'),lineNums=document.getElementById('lineNums'),highlight=document.getElementById('highlight');
const scroll=document.getElementById('scroll'),fx=document.getElementById('fx'),right=document.getElementById('right');
const keywords=['alignas','alignof','auto','bool','break','case','catch','char','class','const','constexpr','continue','default','delete','do','double','else','enum','explicit','extern','false','float','for','friend','goto','if','inline','int','long','mutable','namespace','new','noexcept','nullptr','operator','private','protected','public','register','return','short','signed','sizeof','static','struct','switch','template','this','throw','true','try','typedef','typename','union','unsigned','using','virtual','void','volatile','while'];
const types=['std','string','vector','map','set','unordered_map','unordered_set','pair','tuple','size_t'];
let middleMode=false;
function esc(s){return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function paint(){const t=editor.textContent||'';const lines=t.split('\n').length;lineNums.textContent=Array.from({length:Math.max(lines,1)},(_,i)=>i+1).join('\n');
 let h=esc(t)
 .replace(/(\/\/.*$)/gm,'<span class="c">$1</span>')
 .replace(/("(?:[^"\\]|\\.)*")/g,'<span class="s">$1</span>')
 .replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="n">$1</span>')
 .replace(new RegExp('\\b('+keywords.join('|')+')\\b','g'),'<span class="k">$1</span>')
 .replace(new RegExp('\\b('+types.join('|')+')\\b','g'),'<span class="t">$1</span>');
 highlight.innerHTML=h||'\n'; updatePos();}
function sel(){const s=window.getSelection();if(!s.rangeCount) return null; return s.getRangeAt(0)}
function updatePos(){const r=sel();if(!r) return; const pre=document.createRange();pre.selectNodeContents(editor);pre.setEnd(r.endContainer,r.endOffset);const txt=pre.toString();const ln=txt.split('\n').length,col=txt.length-txt.lastIndexOf('\n');right.textContent=`Ln ${ln}, Col ${col}`;}
function insert(t){document.execCommand('insertText',false,t)}
editor.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();insert('    ')}
 if(['(','[','{','"',"'"].includes(e.key)){e.preventDefault();const p={'(' :')','[':']','{':'}','"':'"',"'":"'"}[e.key];insert(e.key+p);const s=window.getSelection();s.modify('move','backward','character')}
 if(e.key==='Enter'){e.preventDefault();const r=sel(),txt=editor.textContent,idx=(()=>{const pre=document.createRange();pre.selectNodeContents(editor);pre.setEnd(r.endContainer,r.endOffset);return pre.toString().length})();const prev=txt.slice(0,idx).split('\n').pop();const indent=(prev.match(/^\s*/)||[''])[0];insert('\n'+indent)}
 if(e.altKey&&(e.key==='ArrowUp'||e.key==='ArrowDown')){e.preventDefault();moveLine(e.shiftKey,e.key==='ArrowDown')}
 if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('searchbar').classList.toggle('show')}
});
function moveLine(copy,down){const t=editor.textContent, s=sel(); if(!s) return; const pre=document.createRange();pre.selectNodeContents(editor);pre.setEnd(s.endContainer,s.endOffset);const pos=pre.toString().length;
 const arr=t.split('\n'); let offset=0,li=0; for(;li<arr.length;li++){ if(pos<=offset+arr[li].length) break; offset+=arr[li].length+1; }
 if(copy){arr.splice(down?li+1:li,0,arr[li]);}
 else{const ni=down?Math.min(li+1,arr.length-1):Math.max(li-1,0); if(ni===li) return; [arr[li],arr[ni]]=[arr[ni],arr[li]];}
 editor.textContent=arr.join('\n'); paint();}
editor.addEventListener('input',()=>{paint(); splash()});
editor.addEventListener('click',()=>{easeCursor(); updatePos();});
editor.addEventListener('keyup',updatePos);
scroll.addEventListener('scroll',()=>{highlight.style.transform=`translateY(${-scroll.scrollTop}px)`;lineNums.style.transform=`translateY(${-scroll.scrollTop}px)`});
function splash(){const r=sel();if(!r) return; const c=r.getBoundingClientRect(); const b=scroll.getBoundingClientRect(); fx.style.left=(c.left-b.left)+'px'; fx.style.top=(c.top-b.top+12)+'px'; fx.style.opacity=.95; fx.style.transform='translate(-50%,-50%) scale(1.8)'; requestAnimationFrame(()=>{fx.style.opacity=0; fx.style.transform='translate(-50%,-50%) scale(1)';});}
function easeCursor(){splash()}
document.getElementById('toggleExplorer').onclick=()=>document.getElementById('explorer').classList.toggle('hidden');
scroll.addEventListener('mousedown',e=>{if(e.button===1){e.preventDefault();middleMode=!middleMode;document.getElementById('left').textContent=middleMode?'Middle: multi-anchor ON':'C++ | UTF-8 | LF'; if(middleMode){const m=document.createElement('span');m.textContent='│';m.style.color='#7db4ff88';editor.appendChild(m);setTimeout(()=>m.remove(),500);}}});
const findInput=document.getElementById('findInput'),replaceInput=document.getElementById('replaceInput');
document.getElementById('nextBtn').onclick=()=>{const q=findInput.value;if(!q)return;const t=editor.textContent;const i=t.indexOf(q,(window.__fi||0)+1);window.__fi=i<0?0:i;};
document.getElementById('replaceBtn').onclick=()=>{const q=findInput.value;if(!q)return;editor.textContent=editor.textContent.replace(q,replaceInput.value);paint();};
editor.focus();paint();
</script>
</body>
</html>
