<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>c++ studio</title>
<style>
:root{--bg:#111319;--panel:#1a1f2b;--panel2:#151925;--line:#262d3d;--text:#dce5f8;--muted:#7f8baa;--accent:#6baeff}
*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font:13px/1.5 ui-monospace,Consolas,monospace;overflow:hidden}
.app{height:100%;display:grid;grid-template-rows:34px 1fr 26px}.top{display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,#1f2533,#1a1f2b)}
.dot{width:11px;height:11px;border-radius:99px;background:#32405f;transition:.2s}.dot:hover{background:#455882}.title{margin-left:8px;color:#c7d4f1}
.main{display:grid;grid-template-columns:48px 230px 1fr;min-height:0}.activity{border-right:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;align-items:center;gap:8px;background:#151a24}
.icon{width:30px;height:30px;border-radius:9px;background:#26314a;cursor:pointer;transition:.18s}.icon:hover,.icon.active{background:#32456e;transform:translateY(-1px)}
.explorer{border-right:1px solid var(--line);background:#121827;transition:width .2s ease,opacity .2s ease}.explorer.hidden{width:0;opacity:0;overflow:hidden;border-right:0}
.ex-head{padding:12px;color:#9fb2dd;font:600 11px system-ui}.file{margin:0 8px;padding:8px;border-radius:7px;background:#2a3349;color:#dfe8ff}
.editor-wrap{min-width:0;display:grid;grid-template-rows:36px 1fr}.tabs{display:flex;border-bottom:1px solid var(--line);background:#181e2b}.tab{padding:10px 14px;background:#202738;border-right:1px solid var(--line)}
.work{position:relative;overflow:hidden}.search{position:absolute;top:10px;right:12px;display:none;z-index:4;gap:6px;padding:6px;border:1px solid #3a4764;background:#1d2537;border-radius:8px}.search.show{display:flex}
.search input{width:128px;background:#111827;border:1px solid #2f3a52;color:var(--text);padding:6px;border-radius:6px}.search button{background:#2e3c5f;border:0;color:#dce6fd;padding:6px 8px;border-radius:6px;cursor:pointer}
.editor{position:absolute;inset:0;overflow:auto;scroll-behavior:smooth;background:#131a29}.code{display:grid;grid-template-columns:58px 1fr;min-height:100%;padding:8px 0}
.ln{white-space:pre;color:#607193;text-align:right;padding-right:12px;user-select:none}
.layer{position:relative}.hl,.input{font:13px/1.5 ui-monospace,Consolas,monospace;white-space:pre;tab-size:4}
.hl{position:absolute;inset:0;padding-right:22px;pointer-events:none}.input{position:relative;width:100%;min-height:100%;resize:none;border:0;outline:0;background:transparent;color:transparent;caret-color:#e6eeff;padding-right:22px;overflow:hidden}
.k{color:#79b8ff}.t{color:#5dd49a}.n{color:#ffd17a}.s{color:#eb9fe7}.c{color:#7082a7}
.fx{position:absolute;width:18px;height:18px;border-radius:50%;pointer-events:none;opacity:0;background:radial-gradient(circle,#8cc0ff99,transparent 70%);transform:translate(-50%,-50%) scale(.5)}
.status{display:flex;justify-content:space-between;align-items:center;padding:0 10px;border-top:1px solid var(--line);background:#1b2334;color:#9eb0d7;font:12px system-ui}
@keyframes pulse{0%{opacity:.9;transform:translate(-50%,-50%) scale(.6)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}}
@media (max-width:860px){.main{grid-template-columns:48px 0 1fr}.explorer{display:none}}
</style>
</head>
<body>
<div class="app"><div class="top"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="title">c++ studio</div></div>
<div class="main"><div class="activity"><div class="icon active" id="toggleExplorer"></div><div class="icon" id="middleMode"></div></div>
<aside class="explorer" id="explorer"><div class="ex-head">EXPLORER</div><div class="file">📄 untitled.cpp</div></aside>
<section class="editor-wrap"><div class="tabs"><div class="tab">untitled.cpp</div></div><div class="work">
<div class="search" id="search"><input id="find" /><input id="replace" /><button id="next">Next</button><button id="doReplace">Replace</button><button id="fmt">Pretty</button></div>
<div class="editor" id="scroll"><div class="code"><div class="ln" id="ln">1</div><div class="layer"><pre class="hl" id="hl"></pre><textarea id="input" class="input" spellcheck="false"></textarea></div></div></div><div class="fx" id="fx"></div>
</div></section></div><div class="status"><span id="left">C++ | UTF-8 | LF</span><span id="pos">Ln 1, Col 1</span></div></div>
<script>
const input=document.getElementById('input'),hl=document.getElementById('hl'),ln=document.getElementById('ln'),scroll=document.getElementById('scroll'),fx=document.getElementById('fx'),pos=document.getElementById('pos');
const kw='alignas alignof auto bool break case catch char class const constexpr continue default delete do double else enum explicit extern false float for friend goto if inline int long mutable namespace new noexcept nullptr operator private protected public register return short signed sizeof static struct switch template this throw true try typedef typename union unsigned using virtual void volatile while'.split(' ');
const tp='std string vector map set unordered_map unordered_set pair tuple size_t'.split(' ');
const esc=s=>s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
function colorize(t){return esc(t).replace(/(\/\/.*$)/gm,'<span class="c">$1</span>').replace(/("(?:[^"\\]|\\.)*")/g,'<span class="s">$1</span>').replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="n">$1</span>').replace(new RegExp('\\b('+kw.join('|')+')\\b','g'),'<span class="k">$1</span>').replace(new RegExp('\\b('+tp.join('|')+')\\b','g'),'<span class="t">$1</span>');}
function render(){const t=input.value;hl.innerHTML=colorize(t)||'\n';ln.textContent=Array.from({length:Math.max(1,t.split('\n').length)},(_,i)=>i+1).join('\n');updatePos();}
function updatePos(){const p=input.selectionStart;const v=input.value.slice(0,p);const l=v.split('\n').length,c=v.length-v.lastIndexOf('\n');pos.textContent=`Ln ${l}, Col ${c}`}
function pulse(){const r=input.getBoundingClientRect(),line=input.value.slice(0,input.selectionStart).split('\n').length;const col=input.selectionStart-input.value.lastIndexOf('\n',input.selectionStart-1)-1;fx.style.left=(58+col*7.8-scroll.scrollLeft)+'px';fx.style.top=(14+line*19.5-scroll.scrollTop)+'px';fx.style.animation='none';requestAnimationFrame(()=>fx.style.animation='pulse .35s ease-out')}
input.addEventListener('input',()=>{render();pulse()});input.addEventListener('click',updatePos);input.addEventListener('keyup',updatePos);
scroll.addEventListener('scroll',()=>{hl.style.transform=`translate(${-scroll.scrollLeft}px,${-scroll.scrollTop}px)`;ln.style.transform=`translateY(${-scroll.scrollTop}px)`});
input.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=input.selectionStart,e2=input.selectionEnd;input.setRangeText('    ',s,e2,'end');render();}
if(['(','[','{','"',"'"].includes(e.key)){e.preventDefault();const p={')':'(',']':'[','}':'{','"':'"',"'":"'"};const close={'(' :')','[':']','{':'}','"':'"',"'":"'"}[e.key];const s=input.selectionStart;input.setRangeText(e.key+close,s,input.selectionEnd,'end');input.selectionStart=input.selectionEnd=s+1;render();}
if(e.key==='Enter'){e.preventDefault();const s=input.selectionStart;const line=input.value.slice(0,s).split('\n').pop();const base=(line.match(/^\s*/)||[''])[0];const extra=/\{\s*$/.test(line)?'    ':'';input.setRangeText('\n'+base+extra,s,input.selectionEnd,'end');render();}
if(e.altKey&&(e.key==='ArrowUp'||e.key==='ArrowDown')){e.preventDefault();moveLine(e.shiftKey,e.key==='ArrowDown')}
if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('search').classList.toggle('show')}
if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key.toLowerCase()==='f'){e.preventDefault();prettyFormat()}});
function moveLine(copy,down){let lines=input.value.split('\n'),p=input.selectionStart,o=0,i=0;for(;i<lines.length;i++){if(p<=o+lines[i].length)break;o+=lines[i].length+1}if(copy){lines.splice(down?i+1:i,0,lines[i]||'')}else{let j=down?Math.min(i+1,lines.length-1):Math.max(i-1,0);if(i!==j)[lines[i],lines[j]]=[lines[j],lines[i]]}input.value=lines.join('\n');render();}
function prettyFormat(){const src=input.value.split('\n');let indent=0,out=[];for(let raw of src){let line=raw.trim().replace(/\s+/g,' ');if(line.startsWith('}')) indent=Math.max(0,indent-1);if(line) out.push('    '.repeat(indent)+line); else out.push('');if(line.endsWith('{')) indent++;}input.value=out.join('\n');render();}
document.getElementById('fmt').onclick=prettyFormat;
let fi=0;document.getElementById('next').onclick=()=>{const q=document.getElementById('find').value;if(!q)return;const t=input.value;const i=t.indexOf(q,fi+1);fi=i<0?0:i;input.focus();input.selectionStart=fi;input.selectionEnd=fi+q.length;updatePos();};
document.getElementById('doReplace').onclick=()=>{const q=document.getElementById('find').value,r=document.getElementById('replace').value;if(!q)return;input.value=input.value.replace(q,r);render();};
document.getElementById('toggleExplorer').onclick=()=>document.getElementById('explorer').classList.toggle('hidden');
let middle=false;scroll.addEventListener('mousedown',e=>{if(e.button===1){e.preventDefault();middle=!middle;document.getElementById('left').textContent=middle?'Middle: Column-select mode':'C++ | UTF-8 | LF';pulse();}});
render();input.focus();
</script></body></html>
